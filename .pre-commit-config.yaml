repos:
  - repo: local
    hooks:
      - id: pkos-format
        name: Format repository
        entry: npm run format
        language: system
        pass_filenames: false
      - id: pkos-lint
        name: Lint repository
        entry: npm run lint
        language: system
        pass_filenames: false
      - id: pkos-typecheck
        name: Typecheck repository
        entry: npm run typecheck
        language: system
        pass_filenames: false
